services:
  postgres:
    image: postgres:16
    container_name: procurewatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: procurewatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
    ports:
      - "5432:5432"
    volumes:
      - procurewatch_postgres_data:/var/lib/postgresql/data

volumes:
  procurewatch_postgres_data: